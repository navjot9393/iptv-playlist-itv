name: Update IPTV Playlist

on:
  schedule:
    - cron: '0 3 * * 1'  # runs every Monday at 3AM
  workflow_dispatch:      # allows manual run

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.x'

      - name: Install dependencies
        run: pip install requests

      - name: Run filter script
        run: python filter.py

      - name: Commit and push playlist
        env:
          GH_PAT: ${{ secrets.GH_PAT }}   # your Personal Access Token secret
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"
          git add myplaylist.m3u
          git commit -m "Auto update playlist" || echo "No changes"
          git push https://$GH_PAT@github.com/${{ github.repository }}.git HEAD:main